server:
  port: 5601
  host: "localhost"
  not_found: "/404/"

logging:
  enabled: true          # Enable logging globally by default
  console: true          # Enable simple console output (for debugging)
  log_dir: "logs"       # Directory to store log files

# Optional forward proxy listener for HTTP_PROXY / HTTPS_PROXY usage.
# If this block is present, the binary starts a second listener in addition
# to the reverse proxy above.
#
# Claude Code example:
#   HTTP_PROXY=http://127.0.0.1:8080
#   HTTPS_PROXY=http://127.0.0.1:8080
#   NODE_EXTRA_CA_CERTS=/absolute/path/to/certs/mitm-ca-cert.pem
#
# proxy:
#   port: 8080
#   host: "127.0.0.1"
#   verbose: false
#   mitm:
#     enabled: true      # Enable to decrypt/log HTTPS traffic
#     cert_file: "certs/mitm-ca-cert.pem"
#     key_file: "certs/mitm-ca-key.pem"
#     common_name: "logging-proxy MITM CA"
#     organization: "logging-proxy"

routes:
  # OPENAI_BASE_URL=http://localhost:5601/openrouter
  openrouter:
    pattern: "/openrouter/"
    destination: "https://openrouter.ai/api/v1/"
  openrouter_models:
    pattern: "/openrouter/models/"
    destination: "https://openrouter.ai/api/v1/models/"
    logging: false       # Disable logging for this specific route
  # OPENAI_BASE_URL=http://localhost:5601/lmstudio
  lmstudio:
    pattern: "/lmstudio/"
    destination: "http://127.0.0.1:1234/v1/"
  # ANTHROPIC_BASE_URL=http://localhost:5601/anthropic
  anthropic:
    pattern: "/anthropic/"
    destination: "https://api.anthropic.com/"
  # OPENAI_BASE_URL=http://localhost:5601/llama.cpp
  llama.cpp:
    pattern: "/llama.cpp/"
    destination: "http://127.0.0.1:8080/v1/"
